{% extends "base.html" %}
{% block title %}Page not found \u2014 {{ profile.name }}{% endblock %}
{% block content %}
<section class="section not-found">
  <div class="container">
    <p class="eyebrow reveal">404</p>
    <h1 class="reveal">This page didn't ship.</h1>
    <p class="reveal">The page you're looking for doesn't exist, or moved. Try the portfolio instead.</p>
    <a href="{{ url_for('portfolio') }}" class="btn btn-primary reveal" data-magnetic>Back to Portfolio</a>
  </div>
</section>
{% endblock %}
